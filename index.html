<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Gibi Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --pop-pink: #ff477e;
            --pop-cyan: #00dbde;
            --pop-yellow: #fee440;
            --pop-purple: #9b5de5;
            --outline: #000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Open Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            background-image: url('parede-gibi.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f0f2f5; 
        }

        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1; pointer-events: none;
        }

        .sticker-title {
            margin: 30px 0;
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(1.2rem, 4vw, 2rem);
            background: #fff; border: 4px solid var(--outline);
            padding: 8px 20px; transform: rotate(-1deg);
            box-shadow: 8px 8px 0px var(--pop-purple);
            z-index: 10;
        }

        .comic-stage {
            width: 90%; max-width: 600px;
            aspect-ratio: 800 / 1160;
            position: relative;
            perspective: 2000px;
            margin-bottom: 150px;
        }

        .leaf {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: #fff; border: 5px solid var(--outline);
            backface-visibility: hidden;
            transform-origin: left center;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: 8px 8px 15px rgba(0,0,0,0.2);
        }

        .leaf img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .flipped { transform: rotateY(-180deg); }

        .video-trigger {
            margin-top: 20px;
            font-family: 'Bangers', cursive;
            background: var(--pop-pink);
            color: #fff;
            padding: 10px 20px;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: 5px 5px 0px #000;
            transition: 0.2s;
            font-size: 1.2rem;
        }

        .video-trigger:hover { transform: scale(1.1) rotate(2deg); background: #ff1f60; }

        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; 
            justify-content: center; align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .video-container {
            width: 90%; max-width: 500px; 
            aspect-ratio: 9 / 16;
            background: #000;
            border: 6px solid var(--pop-cyan);
            box-shadow: 0 0 30px var(--pop-cyan);
            position: relative;
            transform: scale(0); 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-container.active { transform: scale(1); }

        .video-container video { width: 100%; height: 100%; object-fit: cover; }

        .close-video {
            position: absolute; top: -50px; right: -10px;
            background: var(--pop-yellow); border: 3px solid #000;
            font-family: 'Bangers', cursive; padding: 5px 15px;
            cursor: pointer; font-size: 1.2rem;
        }

        .controls { position: fixed; bottom: 20px; display: flex; gap: 15px; z-index: 100; }
        
        .btn-cartoon {
            font-family: 'Bangers', cursive; font-size: 1.2rem;
            padding: 10px 25px; cursor: pointer;
            border: 4px solid var(--outline); background: #fff;
            box-shadow: 5px 5px 0px var(--outline);
            transition: 0.1s;
        }

        .btn-cartoon:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }
        .btn-next { background: var(--pop-yellow); }
        .btn-prev { background: var(--pop-cyan); color: #fff; }

        .btn-audio {
            background: #fff; border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--outline); cursor: pointer;
            box-shadow: 4px 4px 0px var(--outline); font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="audio-gibi.mp3" type="audio/mpeg">
    </audio>

    <div class="grid-overlay"></div>

    <div class="sticker-title">IA E PRIVACIDADE</div>

    <button class="video-trigger" onclick="abrirVideo()">📺 ASSISTA AO VÍDEO</button>

    <div class="comic-stage">
        <div class="paper-stack">
            <div class="leaf" id="p4" style="z-index: 1;"><img src="final-page-gibi.png"></div>
            <div class="leaf" id="p3" style="z-index: 2;"><img src="page1-minigibi.jpeg"></div>
            <div class="leaf" id="p2" style="z-index: 3;"><img src="intro-mini-gibi.png"></div>
            <div class="leaf" id="p1" style="z-index: 4;"><img src="capa-mini-gibi.jpeg"></div>
        </div>
    </div>

    <div class="video-overlay" id="videoOverlay">
        <div class="video-container" id="videoContainer">
            <button class="close-video" onclick="fecharVideo()">FECHAR [X]</button>
            <video id="meuVideo" controls>
                <source src="Projeto.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="controls">
        <button class="btn-cartoon btn-prev" onclick="voltar()">VOLTAR</button>
        <button class="btn-audio" onclick="toggleMusic()" id="musicBtn">🔇</button>
        <button class="btn-cartoon btn-next" onclick="avancar()">PRÓXIMO</button>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 4;
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const videoOverlay = document.getElementById('videoOverlay');
        const videoContainer = document.getElementById('videoContainer');
        const videoPlayer = document.getElementById('meuVideo');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.innerText = "🔊";
            } else {
                music.pause();
                musicBtn.innerText = "🔇";
            }
        }

        function avancar() {
            if (currentPage < totalPages) {
                const leaf = document.getElementById(`p${currentPage}`);
                leaf.classList.add('flipped');
                setTimeout(() => { leaf.style.zIndex = 0; }, 400);
                currentPage++;
            }
        }

        function voltar() {
            if (currentPage > 1) {
                currentPage--;
                const leaf = document.getElementById(`p${currentPage}`);
                leaf.style.zIndex = (totalPages - currentPage + 10);
                leaf.classList.remove('flipped');
            }
        }

        function abrirVideo() {
            videoOverlay.style.display = 'flex';
            setTimeout(() => {
                videoContainer.classList.add('active');
            }, 10);
            if (!music.paused) music.pause();
        }

        function fecharVideo() {
            videoContainer.classList.remove('active');
            videoPlayer.pause(); 
            setTimeout(() => {
                videoOverlay.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>
